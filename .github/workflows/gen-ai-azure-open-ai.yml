name: gen-ai-azure-open-ai

on:
  push:
    branches:
      - main
    paths:
      - "gen-ai/azure-open-ai/**"
      - ".github/workflows/gen-ai-azure-open-ai.yml"
  pull_request:
    paths:
      - "gen-ai/azure-open-ai/**"
      - ".github/workflows/gen-ai-azure-open-ai.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gen-ai/azure-open-ai

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run unit tests
        run: pytest -v
